name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".goreleaser.yaml"
      - "go.work"
      - "packages/cli/**"
      - "packages/shared/**"

permissions:
  contents: read

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Test CLI
        run: go test ./packages/cli/...

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
